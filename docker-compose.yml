services:
  api:
    build: ../SupermarktAPI-Mannheim
    container_name: supermarkt-api-mannheim
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - ZIP_CODES=${ZIP_CODES:-68159,68161,68309,68519}
      - CACHE_TTL_MINUTES=${CACHE_TTL_MINUTES:-60}
      - REFRESH_CRON=${REFRESH_CRON:-0 */6 * * *}
      - API_RATE_LIMIT_PER_MINUTE=${API_RATE_LIMIT_PER_MINUTE:-60}
    volumes:
      - ../SupermarktAPI-Mannheim/server/database:/app/server/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: .
    container_name: supermarket-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
